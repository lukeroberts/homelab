name: patchmon

services:
  database:
    image: postgres:17-alpine
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    environment:
      POSTGRES_DB: patchmon_db
      POSTGRES_USER: patchmon_user
      POSTGRES_PASSWORD: ${PATCHMON_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - patchmon-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patchmon_user -d patchmon_db"]
      interval: 3s
      timeout: 5s
      retries: 7
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    command: redis-server --requirepass ${PATCHMON_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - patchmon-internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${PATCHMON_REDIS_PASSWORD}", "ping"] 
      interval: 3s
      timeout: 5s
      retries: 7
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  server:
    image: ghcr.io/patchmon/patchmon-server:2.0.2
    restart: unless-stopped
    # See PatchMon Docker README for additional environment variables and configuration instructions
    environment:
      DATABASE_URL: postgresql://patchmon_user:${PATCHMON_POSTGRES_PASSWORD}@database:5432/patchmon_db
      JWT_SECRET: ${PATCHMON_JWT_SECRET}
      SESSION_SECRET: ${PATCHMON_SESSION_SECRET}
      AI_ENCRYPTION_KEY: ${PATCHMON_AI_ENCRYPTION_KEY}
      SERVER_PROTOCOL: https
      SERVER_HOST: ${PATCHMON_CORS_ORIGIN}
      SERVER_PORT: 443
      CORS_ORIGIN: https://${PATCHMON_CORS_ORIGIN}
      TZ: America/Chicago
      GUACD_ADDRESS: guacd:4822
      TRUST_PROXY: true
      # Database Connection Pool Configuration (Prisma)
      DB_CONNECTION_LIMIT: 30
      DB_POOL_TIMEOUT: 20
      DB_CONNECT_TIMEOUT: 10
      DB_IDLE_TIMEOUT: 300
      DB_MAX_LIFETIME: 1800
      # Rate Limiting (times in milliseconds)
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 5000
      AUTH_RATE_LIMIT_WINDOW_MS: 600000
      AUTH_RATE_LIMIT_MAX: 500
      AGENT_RATE_LIMIT_WINDOW_MS: 60000
      AGENT_RATE_LIMIT_MAX: 1000
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${PATCHMON_REDIS_PASSWORD}
      REDIS_DB: 0
      # Assets directory for custom branding (logos, favicons)
      ASSETS_DIR: /app/assets
      #OIDC Configuration
      OIDC_ENABLED: true
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      OIDC_SCOPES: ${OIDC_SCOPES}
      OIDC_AUTO_CREATE_USERS: true
      OIDC_DEFAULT_ROLE: Readonly
      OIDC_BUTTON_TEXT: Login with Authentik
      OIDC_SUPERADMIN_GROUP: ${OIDC_SUPERADMIN_GROUP}
      OIDC_ADMIN_GROUP: ${OIDC_ADMIN_GROUP}
      OIDC_USER_GROUP: ${OIDC_USER_GROUP}
      OIDC_SYNC_ROLES: true
    #volumes:
    #  - agent_files:/app/agents
    #  - branding_assets:/app/assets
    networks:
      - patchmon-internal
      - frontend
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      guacd:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  guacd:
    image: guacamole/guacd:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: '1.0'
    networks:
      - patchmon-internal
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4822 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
#  agent_files:
#  branding_assets:

networks:
  patchmon-internal:
    driver: bridge
  frontend:
    external: true